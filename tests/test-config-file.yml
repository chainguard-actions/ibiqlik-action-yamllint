name: Test config_file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run yamllint with custom config file
        id: action
        uses: .
        with:
          file_or_dir: actions/hardened/ibiqlik--action-yamllint/v3.0.2/tests/fixtures/valid.yaml
          config_file: actions/hardened/ibiqlik--action-yamllint/v3.0.2/tests/fixtures/yamllint-config.yml
          format: parsable
      - name: Assert lint passed with custom config
        run: |
          echo "PASS: yamllint completed successfully with custom config_file"
