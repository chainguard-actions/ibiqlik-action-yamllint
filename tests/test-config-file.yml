name: Test config_file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          file_or_dir: actions/hardened/ibiqlik--action-yamllint/v3.1.1/tests/fixtures/valid.yaml
          config_file: actions/hardened/ibiqlik--action-yamllint/v3.1.1/tests/fixtures/custom-config.yaml
          format: parsable
      - name: Assert logfile output is set
        env:
          LOGFILE: ${{ steps.action.outputs.logfile }}
        run: |
          echo "logfile: $LOGFILE"
          if [ -z "$LOGFILE" ]; then
            echo "FAIL: logfile output is empty"
            exit 1
          fi
          if [ ! -f "$LOGFILE" ]; then
            echo "FAIL: logfile does not exist at $LOGFILE"
            exit 1
          fi
          echo "PASS: logfile exists at $LOGFILE"
