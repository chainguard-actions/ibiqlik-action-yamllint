name: Test config_data input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run yamllint with inline config_data
        id: action
        uses: .
        with:
          file_or_dir: actions/hardened/ibiqlik--action-yamllint/v3.0.2/tests/fixtures/valid.yaml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                allowed-values: ['true', 'false']
          format: parsable
      - name: Assert lint passed with inline config_data
        run: |
          echo "PASS: yamllint completed successfully with inline config_data"
