name: Test config_data input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          file_or_dir: actions/hardened/ibiqlik--action-yamllint/v3.1.1/tests/fixtures/valid.yaml
          config_data: |
            extends: default
            rules:
              line-length: disable
              trailing-spaces: disable
              new-line-at-end-of-file: disable
          format: parsable
      - name: Assert logfile output is set
        env:
          LOGFILE: ${{ steps.action.outputs.logfile }}
        run: |
          echo "logfile: $LOGFILE"
          if [ -z "$LOGFILE" ]; then
            echo "FAIL: expected logfile output to be set"
            exit 1
          fi
          echo "PASS: logfile output is set to $LOGFILE"
