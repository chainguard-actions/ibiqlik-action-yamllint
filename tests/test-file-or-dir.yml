name: Test file_or_dir input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run yamllint on specific file
        id: action
        uses: .
        with:
          file_or_dir: actions/hardened/ibiqlik--action-yamllint/v3.0.2/tests/fixtures/valid.yaml
          format: parsable
      - name: Assert lint passed
        run: |
          echo "PASS: yamllint completed successfully on valid YAML file"
